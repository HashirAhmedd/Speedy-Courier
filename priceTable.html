<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <title>Price Table</title>
</head>
<body>

    <div class="spNavbar">
        <h1 class="sp display-4">Price Table</h1>
    </div>

    <section class="priceTable">
        <table class="table table-striped">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Weight Range</th>
                <th scope="col">Price (PKR)</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row">1</th>
                <td>Below 500 grams</td>
                <td>500</td>
              </tr>
              <tr>
                <th scope="row">2</th>
                <td>500 grams - 5 kg</td>
                <td>1,000</td>
              </tr>
              <tr>
                <th scope="row">3</th>
                <td>6 kg - 10 kg</td>
                <td>7,000</td>
              </tr>
              <tr>
                <th scope="row">4</th>
                <td>11 kg - 30 kg</td>
                <td>10,000</td>
              </tr>
              <tr>
                <th scope="row">5</th>
                <td>31 kg - 50 kg</td>
                <td>15,000</td>
              </tr>
              <tr>
                <th scope="row">6</th>
                <td>Above 50 kg</td>
                <td>20,000</td>
              </tr>
            </tbody>
        </table>
    </section>

</body>
</html>
